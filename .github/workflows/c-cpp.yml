name: C/C++ CI

on:
  push:
    branches: [ "github_ci" ]
  pull_request:
    branches: [ "github_ci" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
          submodules: recursive
    
    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v5
    
    - name: CMake generate
      run: cmake --preset=ninja-clang
